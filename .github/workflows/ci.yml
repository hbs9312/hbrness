name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build all harnesses
        run: bash scripts/build.sh all

      - name: Validate build output
        run: bash scripts/validate.sh

      - name: CLI smoke tests
        run: |
          node bin/hbrness.js --version
          node bin/hbrness.js --help
          node bin/hbrness.js plugins claude
          node bin/hbrness.js plugins codex
          node bin/hbrness.js install claude ghflow --dry-run

      - name: npm pack dry-run
        run: npm pack --dry-run
